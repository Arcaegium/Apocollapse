<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APOCOLLAPSE</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>
<div id="gameRoot">
  <div id="wrapper">
    <canvas id="gameCanvas" width="640" height="640"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hudScore">0</span>
      </div>
      <div class="hud-block" style="text-align:center">
        <span class="hud-label">Wave</span>
        <span class="hud-value" id="hudWave">1</span>
      </div>
      <div class="hud-block" style="text-align:right">
        <span class="hud-label">Kills</span>
        <span class="hud-value" id="hudKills">0</span>
      </div>
    </div>

    <!-- Active apocalypse pills -->
    <div id="apocBanner"></div>

    <!-- Wave announce -->
    <div id="waveAnnounce"></div>

    <!-- Effectiveness flash -->
    <div id="effectFlash"></div>

    <!-- Ability bar -->
    <div id="abilityBar"></div>

    <!-- Controls hint -->
    <div id="controls">
      <span>WASD move</span>
      <span>mouse aim</span>
      <span>1-4 / scroll select ability</span>
      <span>space use</span>
    </div>

    <!-- Screen overlays — shown/hidden by screen system -->
    <div id="screenTitle" class="screen"></div>
    <div id="screenBreak" class="screen" style="display:none"></div>
    <div id="screenDead" class="screen" style="display:none"></div>
  </div>
</div>

<!-- Load order: constants → data → systems → screens → renderer → main -->
<script src="js/constants.js"></script>
<script src="js/sprites.js"></script>
<script src="js/data/apocalypses.js"></script>
<script src="js/data/weapons.js"></script>
<script src="js/data/avatars.js"></script>
<script src="js/data/enemies.js"></script>
<script src="js/systems/particles.js"></script>
<script src="js/systems/terrain.js"></script>
<script src="js/systems/formation.js"></script>
<script src="js/systems/combat.js"></script>
<script src="js/systems/enemies.js"></script>
<script src="js/systems/skills.js"></script>
<script src="js/systems/progression.js"></script>
<script src="js/screens/title.js"></script>
<script src="js/screens/breakscreen.js"></script>
<script src="js/screens/gameover.js"></script>
<script src="js/renderer.js"></script>
<script src="js/main.js"></script>
</body>
</html>
